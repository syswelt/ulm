.cat-block { margin-bottom: 1.5rem; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
.cat-header { padding: 10px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
.cat-header:hover { background: var(--color-background-secondary); }
.cat-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.cat-meta { font-size: 12px; color: var(--color-text-secondary); }
.cat-body { padding: 12px 16px 14px; border-top: 0.5px solid var(--color-border-tertiary); }
.author-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
.author-name { font-size: 13px; color: var(--color-text-primary); min-width: 200px; }
.bar-wrap { flex: 1; height: 10px; background: var(--color-background-secondary); border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.3s; }
.count { font-size: 12px; color: var(--color-text-secondary); min-width: 28px; text-align: right; }
.badge { font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 10px; }
.chevron { font-size: 11px; color: var(--color-text-tertiary); transition: transform 0.2s; }
.open .chevron { transform: rotate(180deg); }
.filter-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
.filter-btn { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
.filter-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; }
.legend { display: flex; gap: 14px; font-size: 11px; color: var(--color-text-secondary); margin-bottom: 1rem; flex-wrap: wrap; }
.leg-dot { width: 9px; height: 9px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: middle; }
</style>

const maxCount = 19;

function buildBar(count, color) {
  const pct = Math.round((count / maxCount) * 100);
  return `<div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${color}22;border:1px solid ${color}55;box-sizing:border-box;"></div></div>`;
}

function render(filter) {
  const container = document.getElementById('cats');
  container.innerHTML = '';
  data.forEach(cat => {
    const show = filter === 'all'
      || (filter === 'theatre' && cat.group === 'theatre')
      || (filter === 'poesie' && cat.group === 'poesie')
      || (filter === 'fiction' && cat.group === 'fiction')
      || (filter === 'uk' && cat.region === 'uk')
      || (filter === 'us' && cat.region === 'us')
      || (filter === 'commonwealth' && cat.region === 'commonwealth');
    if (!show) return;

    const div = document.createElement('div');
    div.className = 'cat-block';
    const top3 = cat.authors.slice(0, 3).map(a => a[0]).join(', ');
    const rows = cat.authors.slice(0, 10).map(([name, count]) =>
      `<div class="author-row">
        <span class="author-name">${name}</span>
        ${buildBar(count, cat.color)}
        <span class="count">${count}×</span>
      </div>`
    ).join('');
    div.innerHTML = `
      <div class="cat-header" onclick="toggle(this)">
        <span>
          <span class="cat-title">${cat.title}</span>
          <span class="cat-meta" style="margin-left:10px;display:inline-block;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${top3}…</span>
        </span>
        <span class="chevron">▼</span>
      </div>
      <div class="cat-body" style="display:none">${rows}</div>
    `;
    container.appendChild(div);
  });
}

function toggle(header) {
  const body = header.nextElementSibling;
  const block = header.parentElement;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  block.classList.toggle('open', !open);
}

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.dataset.filter) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  render(e.target.dataset.filter);
});

render('all');
