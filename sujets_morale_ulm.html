function render() {
  const cont = document.getElementById('cats');
  data.forEach((cat, i) => {
    const div = document.createElement('div');
    div.className = 'cat ' + cat.color;
    const pillsHtml = cat.sujets.map(([s]) =>
      `<span class="pill">${s}</span>`
    ).join('');
    div.innerHTML = `
      <div class="cat-header" onclick="toggle(${i})">
        <span class="cat-title">${cat.label}</span>
        <span class="cat-count">${cat.sujets.length} sujets</span>
        <span class="toggle-btn" id="tbtn-${i}">▾</span>
      </div>
      <div class="pill-grid" id="pg-${i}">${pillsHtml}</div>
    `;
    if (i < data.length - 1) {
      const d = document.createElement('div');
      d.className = 'divider';
      div.appendChild(d);
    }
    cont.appendChild(div);
  });
}

function toggle(i) {
  const pg = document.getElementById('pg-' + i);
  const btn = document.getElementById('tbtn-' + i);
  const hidden = pg.style.display === 'none';
  pg.style.display = hidden ? 'flex' : 'none';
  btn.textContent = hidden ? '▾' : '▸';
}

render();
