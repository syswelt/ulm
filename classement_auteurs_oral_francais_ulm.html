const eraLabels = {xvi:"XVIe",xvii:"XVIIe",xviii:"XVIIIe",xix:"XIXe",xx:"XXe–XXIe"};
const medals = {1:"🥇",2:"🥈",3:"🥉"};
let current = 'all';

function filter(era, btn) {
  current = era;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const filtered = current === 'all' ? data : data.filter(d => d.era === current);
  const max = filtered[0]?.count || 1;
  const list = document.getElementById('list');
  list.innerHTML = filtered.map((d, i) => {
    const pct = Math.round(d.count / max * 100);
    return `<div class="row">
      <span class="rank">${i+1}</span>
      <span class="medal">${medals[i+1] || ''}</span>
      <span class="name">${d.name}</span>
      <div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${d.color}"></div></div>
      <span class="count">${d.count}</span>
      <span class="era" style="background:${d.color}22;color:${d.color}">${eraLabels[d.era]}</span>
    </div>`;
  }).join('');
}
